services:
  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "Server=YOUR_HOST;Port=4000;Database=booklog;User=YOUR_USER;Password=YOUR_PASSWORD;SslMode=VerifyCA;CertificateFile=/app/secrets/tidb-ca.pem"
    volumes:
      - ./secrets:/app/secrets:ro
    restart: unless-stopped